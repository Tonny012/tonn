<section class="refund-policy">
  <div class="container">

    <h1>Refund Policy</h1>

    <p><strong>Effective Date:</strong> May 27, 2026</p>

    <p>
      Welcome to 
      <a href="https://fingermonkeybreeders.com/" target="_blank">
        K G Finger Monkeys
      </a>. We value transparency, trust, and responsible animal placement. This Refund Policy explains the conditions regarding deposits, reservations, cancellations, and refunds related to our services and animal placements.
    </p>

    <div class="policy-highlight">
      <p>
        Our goal is to ensure a fair, professional, and transparent process while prioritizing the wellbeing and responsible placement of every finger monkey.
      </p>
    </div>

    <hr>

    <h2>1. Reservation Deposits</h2>

    <p>
      To reserve a finger monkey or secure a scheduled appointment, a deposit is required.
    </p>

    <ul>
      <li>Deposits are used to reserve and hold the animal for the buyer</li>
      <li>The reserved animal will be temporarily removed from public availability</li>
      <li>Deposits are applied toward the final purchase price</li>
      <li>All deposits are generally refundable</li>
    </ul>

    <p>
      Because reservation deposits prevent other qualified buyers from adopting the animal, deposits may compensate for lost availability and administrative preparation.
    </p>

    <hr>

    <h2>2. Refund Eligibility</h2>

    <p>Refunds are considered under limited circumstances, including:</p>

    <ul>
      <li>If we are unable to provide the reserved animal</li>
      <li>If the animal becomes unavailable due to health or safety concerns before delivery or pickup</li>
      <li>If a duplicate payment or billing error occurs</li>
      <li>If required by applicable law</li>
    </ul>

    <p>
      Approved refunds will be issued using the original payment method.
    </p>

    <hr>

    <h2>3. Non-Refundable Situations</h2>

    <p>Refunds will not be issued for:</p>

    <ul>
      <li>Failure to verify local or state exotic animal ownership laws</li>
      <li>Failure to complete payment arrangements within the agreed timeframe</li>
      <li>Failure to respond to communication attempts</li>
      <li>Housing, permit, landlord, or family-related issues after reservation</li>
      <li>Transportation delays caused by weather, airline restrictions, or third parties</li>
      <li>Improper care or environmental conditions after pickup or delivery</li>
    </ul>

    <div class="policy-highlight">
      <p>
        Buyers are responsible for confirming that exotic primate ownership is legal within their state, county, and municipality before placing a deposit or making a purchase.
      </p>
    </div>

    <hr>

    <h2>4. Health-Related Concerns</h2>

    <p>
      We take pride in providing healthy, well-socialized finger monkeys raised in a caring environment.
    </p>

    <p>
      Buyers are encouraged to schedule a veterinary examination within 72 hours of receiving their animal.
    </p>

    <p>
      If a licensed veterinarian identifies a serious pre-existing health condition within the required examination period, buyers must contact us immediately with supporting documentation for review.
    </p>

    <p>
      Any resolution offered will be determined at our discretion based on veterinary findings and applicable agreements.
    </p>

    <hr>

    <h2>5. Cancellations</h2>

    <p>
      If a buyer chooses to cancel a reservation after placing a deposit, the deposit may be forfeited.
    </p>

    <p>
      We reserve the right to cancel any reservation or sale if:
    </p>

    <ul>
      <li>Fraudulent activity is suspected</li>
      <li>False information has been provided</li>
      <li>Animal welfare concerns arise</li>
      <li>The buyer fails to comply with agreed requirements</li>
      <li>Unsafe placement conditions are identified</li>
    </ul>

    <hr>

    <h2>6. Chargebacks & Payment Disputes</h2>

    <p>
      Customers agree to contact us directly before initiating any chargeback or payment dispute.
    </p>

    <p>
      Fraudulent or bad-faith chargebacks may result in:
    </p>

    <ul>
      <li>Permanent refusal of future service</li>
      <li>Cancellation of reservations or delivery arrangements</li>
      <li>Submission of supporting documentation to payment providers</li>
      <li>Legal action where applicable</li>
    </ul>

    <hr>

    <h2>7. Delivery & Transportation Policy</h2>

    <p>
      Delivery and transportation timelines are estimates and may be affected by:
    </p>

    <ul>
      <li>Weather conditions</li>
      <li>Airline or transportation restrictions</li>
      <li>Animal safety requirements</li>
      <li>Veterinary clearance procedures</li>
      <li>State or local regulations</li>
    </ul>

    <p>
      We prioritize the health, comfort, and safety of every animal during transportation and reserve the right to delay transportation when necessary for animal welfare.
    </p>

    <hr>

    <h2>8. Policy Updates</h2>

    <p>
      We may update or modify this Refund Policy at any time without prior notice.
    </p>

    <p>
      Continued use of our website or services after updates constitutes acceptance of the revised policy.
    </p>

    <hr>

    <h2>9. Contact Information</h2>

    <p>
      If you have questions regarding this Refund Policy, please contact us through our official website:
    </p>

    <p>
      <a href="https://fingermonkeybreeders.com/contact.html" target="_blank">
        https://fingermonkeybreeders.com/contact.html
      </a>
    </p>

    <p>
      <strong>Business Hours:</strong><br />
      Monday – Saturday: 10:00 AM – 5:00 PM<br />
      Sunday: 12:00 PM – 3:00 PM
    </p>

    <p>
      Visits are by appointment only.
    </p>

  </div>
